<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css')}}">

    <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js" defer></script>

    <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>

</head>
<body>
    <h1>TrocaPrato</h1>
    <form method="POST" action="/resultado" id="comparador" novalidate>

        <div class="caixa" id="div-alimento-a">
            <h2>Qual alimento você deseja substituir?</h2>
            <select name="alimento-a" id="select-alimento-a" required></select>
            <select id="filtro-a">
                <option value="todas">todas as categorias</option>
                <option value="cereais e derivados">cereais e derivados</option>
                <option value="verduras e hortaliças">verduras e hortaliças</option>
                <option value="frutas">frutas</option>
                <option value="gorduras">gorduras</option>
                <option value="pescados e frutos do mar">pescados e frutos do mar</option>
                <option value="carnes e derivados">carnes e derivados</option>
                <option value="leite e derivados">leite e derivados</option>
                <option value="bebidas">bebidas</option>
                <option value="ovos e derivados">ovos e derivados</option>
                <option value="alimentos doces">alimentos doces</option>
                <option value="outros alimentos">outros alimentos</option>
                <option value="leguminosas">leguminosas</option>
                <option value="nozes e sementes">nozes e sementes</option>
            </select>
            <p class="escondido" id="msg-erro-1">Informe um alimento.</p>
        </div>

        <span id="btn-prox-1" class="proximo">-></span>

        <div class="caixa escondido" id="div-peso">
            <h2>Quantas gramas desse alimento você deveria consumir?</h2>
            <input type="number" name="peso_a" id="peso-a" min="1" max="999" required>
            <p class="escondido" id="msg-erro-2">Informe o peso.</p>
        </div>

        <span id="btn-prox-2" class="proximo escondido">-></span>

        <div class="caixa escondido" id="div-alimento-b">
            <span class="teste">Você deseja substituir </span><span class="teste" id="label-alimento"></span><span class="teste"> por qual alimento?</span>
            <select name="alimento-b" id="select-alimento-b" required></select>
            <select id="filtro-b">
                <option value="todas">todas as categorias</option>
                <option value="cereais e derivados">cereais e derivados</option>
                <option value="verduras e hortaliças">verduras e hortaliças</option>
                <option value="frutas">frutas</option>
                <option value="gorduras">gorduras</option>
                <option value="pescados e frutos do mar">pescados e frutos do mar</option>
                <option value="carnes e derivados">carnes e derivados</option>
                <option value="leite e derivados">leite e derivados</option>
                <option value="bebidas">bebidas</option>
                <option value="ovos e derivados">ovos e derivados</option>
                <option value="alimentos doces">alimentos doces</option>
                <option value="outros alimentos">outros alimentos</option>
                <option value="leguminosas">leguminosas</option>
                <option value="nozes e sementes">nozes e sementes</option>
            </select>
            <p class="escondido" id="msg-erro-3">Informe o alimento.</p>
        </div>
        
        <button id="btn-submit" type="submit" class="escondido">-></button>
    </form>
</body>
</html>
