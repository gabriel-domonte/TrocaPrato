<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TrocaPrato</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/autenticacao.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animation.css') }}">
</head>
<body>


    <section class="auth-container">

        <div class="auth-card">

            <h1><a href="/">Troca Prato</a></h1>
            <p>Entre na sua conta</p>

            {% if erros.geral %}
                <p class="erro animar-erro" id="msg-erro">{{ erros.geral }}</p>
            {% endif %}

            <form method="POST" action="/login">

                <div class="campo">
                    <label for="usuario">Usuário</label>
                    <input
                        type="text"
                        id="usuario"
                        name="usuario"
                        placeholder="Digite seu usuário"
                        value="{{ request.form.get('usuario', '') }}"
                    >

                    {% if erros.usuario %}
                        <p class="erro animar-erro" id="msg-erro">{{ erros.usuario }}</p>
                    {% endif %}
                </div>

                <div class="campo">
                    <label for="senha">Senha</label>
                    <input
                        type="password"
                        id="senha"
                        name="senha"
                        placeholder="Digite sua senha"
                    >

                    {% if erros.senha %}
                        <p class="erro animar-erro"  id="msg-erro">{{ erros.senha }}</p>
                    {% endif %}
                </div>

                <button type="submit">
                    Entrar
                </button>

            </form>

            <span>
                Não possui conta?
                <a href="/cadastro">Cadastre-se</a>
            </span>

        </div>

    </section>

</body>
</html>
